services:
  - type: web
    name: skillhub-web
    runtime: node
    rootDir: apps/web
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port 10000
    healthCheckPath: /
    envVars:
      - key: SKILLHUB_SESSION_SECRET
        generateValue: true
      - key: SKILLHUB_API_BASE_URL
        value: https://skillhub-api-us5i.onrender.com

  - type: web
    name: skillhub-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    disk:
      name: skillhub-data
      mountPath: /app/storage
      sizeGB: 5
    envVars:
      - key: PUBLIC_BASE_URL
        value: https://skillhub-api-us5i.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: skillhub-db
          property: connectionString
      - key: STORAGE_DIR
        value: /app/storage
      - key: DEFAULT_LLM_PROVIDER
        value: deepseek
      - key: ALLOW_PARTIAL_SKILL
        value: "true"
      - key: CORS_ORIGINS
        value: https://skillhub-web-2pjw.onrender.com
      - key: DEEPSEEK_KEY
        sync: false
      - key: MINERU_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: skillhub-db
    plan: free
    databaseName: skillhub
    user: skillhub
