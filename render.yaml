services:
  - type: web
    name: skillhub-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    plan: free
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./storage/skillhub.db
      - key: STORAGE_DIR
        value: ./storage
      - key: DEFAULT_LLM_PROVIDER
        value: deepseek
      - key: ALLOW_PARTIAL_SKILL
        value: "true"
      - key: CORS_ORIGINS
        value: https://your-vercel-domain.vercel.app
